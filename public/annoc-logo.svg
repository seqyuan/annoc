<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Define the colorful segments as individual circles -->

  <!-- Red-Orange gradient segment (top-left to top) -->
  <path d="M 256 16 A 240 240 0 0 1 362.7 48.7 L 256 256 Z" fill="#E74C3C"/>
  <path d="M 362.7 48.7 A 240 240 0 0 1 432.5 125 L 256 256 Z" fill="#E67E22"/>

  <!-- Orange-Yellow segment (top to right) -->
  <path d="M 432.5 125 A 240 240 0 0 1 463.3 149.3 L 256 256 Z" fill="#F39C12"/>
  <path d="M 463.3 149.3 A 240 240 0 0 1 496 256 L 256 256 Z" fill="#F1C40F"/>

  <!-- Yellow-Green segment (right to bottom-right) -->
  <path d="M 496 256 A 240 240 0 0 1 463.3 362.7 L 256 256 Z" fill="#2ECC71"/>
  <path d="M 463.3 362.7 A 240 240 0 0 1 387 432.5 L 256 256 Z" fill="#27AE60"/>

  <!-- Green-Blue segment (bottom-right to bottom) -->
  <path d="M 387 432.5 A 240 240 0 0 1 256 496 L 256 256 Z" fill="#3498DB"/>
  <path d="M 256 496 A 240 240 0 0 1 149.3 463.3 L 256 256 Z" fill="#2980B9"/>

  <!-- Blue-Purple segment (bottom to bottom-left) -->
