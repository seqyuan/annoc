  <path d="M 16 256 A 240 240 0 0 1 48.7 149.3 L 256 256 Z" fill="#C0392B"/>

  <!-- Red segment completing the circle -->
  <path d="M 48.7 149.3 A 240 240 0 0 1 125 79.5 L 256 256 Z" fill="#E74C3C"/>
  <path d="M 125 79.5 A 240 240 0 0 1 256 16 L 256 256 Z" fill="#E74C3C"/>

