    <circle cx="390" cy="330" r="6"/>
    <circle cx="410" cy="280" r="5"/>
    <circle cx="415" cy="230" r="6"/>
    <circle cx="400" cy="180" r="5"/>
    <circle cx="370" cy="140" r="6"/>
